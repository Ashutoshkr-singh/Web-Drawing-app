<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafter - Unleash your creativity</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>


    <link rel="stylesheet" href="style.css">
</head>
<body>


    <header class="top-bar">
        <div class="top-left">

            <button id="undo-btn">
                <i class="ph ph-arrow-u-up-left"></i>
            </button>
            <button id="redo-btn">
                <i class="ph ph-arrow-u-up-right"></i>
            </button>
        </div>
    <div class="top-right">

    
        <button id="theme-toggle">
            <i class="ph ph-moon"></i>
        </button>
    
    </div>

</header>

    <main class="canvas-board">
        <canvas id="drawing-board"></canvas>
    </main>

<footer class="bottom-bar">

<section id="toolbar">
    <button id="cursor">
        <i class="ph ph-hand-palm"></i>

    </button>
    <div class="shape-grp">

        <button id="shapes-icon">
            <i class="ph ph-circle"></i>
        </button>
<div class="shape-popupmenu " id="shapes-popup">
    <button class="sub-tools"><i class="ph ph-square"></i>Rectangle</button>
    <button class="sub-tools"><i class="ph ph-triangle"></i>Triangle</button>
    <button class="sub-tools"><i class="ph ph-minus"></i>Line</button>
    <button class="sub-tools"><i class="ph ph-arrow-right"></i>Arrow</button>
    <button class="sub-tools"><i class="ph ph-star"></i>Star</button>


</div>


    </div>


    <div class="brush-grp">
    <button id="brush">
        <i class="ph ph-paint-brush"></i>
    </button>

    <div class="brush-popup">

        <button class="sub-brush"><i class="ph ph-paint-brush"></i>Brush</button>
            <button class="sub-brush"><i class="ph ph-pen"></i>Pen</button>
            <button class="sub-brush"><i class="ph ph-pencil"></i>Pencil</button>

        <hr style="margin: 0.5rem 0; border: 1px solid #ccc;"> <label>Size<input type="range" min="1" max="50" value="5"></label>
        
           
        <input type="number" id="brush-size" min="1" max="50" value="5">


        
        <label><input type="color" value="#000000"></label>

        <select  id="brush-styles">
            <option value="solid">Solid</option>
            <option value="dashed">Dashed</option>
            <option value="dotted">Dotted</option>
        </select>

        
    </div>


    </div>

    <div id="text-grp">
       
        <button id="text">
            <i class="ph ph-text-t"></i>
        </button>

        
    </div>

    <button id="eraser">
        <i class="ph ph-eraser"></i>
    </button>

    <button id="image">
        <i class="ph ph-image"></i>
    </button>
    
</section>

    </footer>



 <script src="app.js"></script>
</body>

</html>
